<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavor Candy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="round">
            <img src="../../public/logo.jpg" alt="LOGO">
        </div>
        <div class="input-label">
            <label for="nome">Usuário</label>
            <input type="text" id="nome" placeholder="Insira o usuário">
        </div>
        <div class="input-label">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Insira a senha">
            <div onclick="showPassword()">
                <img src="../../public/eye.png" alt="senha" id="eye" class="eye" width="25px">
            </div>
        </div>
        <button class="btm-login" onclick="login()">Login</button>
    </div>
    <div class="error-div" id="error-modal">
        <h3>Credenciais incorretas!</h3>
        <button onclick="fecharError()">❌</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
